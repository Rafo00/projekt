<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taschenrechner</title>

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .oben {
            height: 65px;
            width: 100%;
            background-color: black;
            position: absolute;
            top: 0;
        }

        .überschrift {
            color: white;
            text-align: center;
        }
        .rechteck {
            width: 400px;
            height: 400px;
            border: 2px solid black;
        }
    </style>
</head>

<body>

<header class="oben">
    <p class="überschrift">Taschenrechner</p>
</header>

<div class="rechteck"></div>

</body>
</html>
