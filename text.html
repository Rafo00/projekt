<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Handy Rechner mit Startbildschirm</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">

  <script>
    function appendOperation(operation) {
      document.getElementById("hallo").innerHTML += operation;
    }

    function result() {
      let container = document.getElementById("hallo");
      try {
        let res = eval(container.innerHTML);
        container.innerHTML = res;
      } catch (e) {
        container.innerHTML = "Fehler";
      }
    }

    function del() {
      let container = document.getElementById("hallo");
      container.innerHTML = container.innerHTML.slice(0, -1);
    }
  </script>
</head>
<body>

  <div id="hallo"></div>

  <!-- Rechner-Tabelle -->
  <table>
    <tr>
      <td></td>
      <td></td>
      <td></td>
      <td onclick="del()">DEL</td>
    </tr>
    <tr>
      <td onclick="appendOperation(7)">7</td>
      <td onclick="appendOperation(8)">8</td>
      <td onclick="appendOperation(9)">9</td>
      <td onclick="appendOperation('/')">/</td>
    </tr>
    <tr>
      <td onclick="appendOperation(4)">4</td>
      <td onclick="appendOperation(5)">5</td>
      <td onclick="appendOperation(6)">6</td>
      <td onclick="appendOperation('*')">*</td>
    </tr>
    <tr>
      <td onclick="appendOperation(1)">1</td>
      <td onclick="appendOperation(2)">2</td>
      <td onclick="appendOperation(3)">3</td>
      <td onclick="appendOperation('+')">+</td>
    </tr>
    <tr>
      <td onclick="appendOperation(0)">0</td>
      <td onclick="appendOperation('.')">.</td>
      <td onclick="result()" id="ergebnis">=</td>
      <td onclick="appendOperation('-')">-</td>
    </tr>
  </table>

</body>
</html>
